name: Docker Build ARM64

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  # ─── DETECT CHANGES ───────────────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'back/**'
              - '.github/workflows/docker-build.yml'
            frontend:
              - 'front/**'
              - '.github/workflows/docker-build.yml'

  # ─── PR CHECK : build only, no push (with cache) ────────────────────────
  build-check:
    if: github.event_name == 'pull_request'
    needs: changes
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [back, front]
        exclude:
          - service: back
            include: ${{ needs.changes.outputs.backend == 'false' }}
          - service: front
            include: ${{ needs.changes.outputs.frontend == 'false' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} (ARM64 — no push, with cache)
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          platforms: linux/arm64
          push: false
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/gillesdechasles-${{ matrix.service }}:buildcache
          cache-to: type=gha,mode=max

  # ─── MAIN PUSH : build + push (with cache) ──────────────────────────────
  build-and-push:
    if: github.event_name == 'push'
    needs: changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: back
            changed: ${{ needs.changes.outputs.backend == 'true' }}
          - service: front
            changed: ${{ needs.changes.outputs.frontend == 'true' }}
      fail-fast: false
    steps:
      - name: Skip if unchanged
        if: matrix.changed == 'false'
        run: echo "Skipping ${{ matrix.service }} — no changes"

      - uses: actions/checkout@v4
        if: matrix.changed == 'true'

      - name: Set up QEMU
        if: matrix.changed == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: matrix.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: matrix.changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }} (ARM64)
        if: matrix.changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          platforms: linux/arm64
          push: true
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/gillesdechasles-${{ matrix.service }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/gillesdechasles-${{ matrix.service }}:buildcache,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/gillesdechasles-${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/gillesdechasles-${{ matrix.service }}:${{ github.sha }}
